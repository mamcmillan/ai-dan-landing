<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai&#8202;⋈&#8202;dan — Legal intelligence, refined.</title>
  <meta name="description" content="A unified AI suite built for the practice of law." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #881111;
      --red-h:      #A41919;
      --ink:        #1E1C1A;
      --ink-2:      #4A4640;
      --ink-3:      #6B6560;
      --muted:      #A8A29E;
      --line:       #D5D0CA;
      --paper:      #FDFDF6;
      --paper-warm: #FFFFEE;
      --radius:     8px;
      --t:          180ms ease;
      --font-brand: 'Crimson Text', Georgia, 'Times New Roman', serif;
      --font-ui:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--paper-warm);
      color: var(--ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    .accent-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px; background: var(--red); z-index: 10;
    }

    /* ── two-column layout, collapses below 600px ── */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) minmax(280px, 1fr);
    }

    /* ── brand panel ── */
    .brand-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 64px;
      background: var(--paper-warm);
      border-right: 1px solid var(--line);
    }

    .wordmark-img {
      display: block;
      height: 68px;
      width: auto;
      margin-bottom: 36px;
      user-select: none;
    }

    .brand-rule {
      width: 24px; height: 2px;
      background: var(--red); margin-bottom: 24px;
    }

    .brand-tagline {
      font-family: var(--font-brand);
      font-size: 20px; font-weight: 400;
      color: var(--ink-2); line-height: 1.7;
      max-width: 300px;
    }

    .brand-tagline strong {
      font-weight: 400;
      color: var(--ink);
    }

    /* ── login panel ── */
    .login-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 64px;
      background: var(--paper);
    }

    .login-card { width: 100%; max-width: 320px; }

    .login-heading {
      font-family: var(--font-brand);
      font-size: 28px; font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--ink); margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px; color: var(--ink-3);
      margin-bottom: 40px; line-height: 1.65;
    }

    .btn-ms {
      width: 100%; padding: 14px 20px;
      background: var(--red); border: none;
      border-radius: var(--radius);
      font-size: 13.5px; font-weight: 500;
      color: #fff; cursor: pointer;
      font-family: var(--font-ui);
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
      transition: background var(--t), transform var(--t), box-shadow var(--t);
      box-shadow: 0 1px 2px rgba(30,28,26,.06), 0 2px 8px rgba(136,17,17,.12);
      text-decoration: none;
    }

    .btn-ms:hover {
      background: var(--red-h);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(136,17,17,.22);
    }

    .btn-ms:active { transform: none; }

    /* Microsoft four-square logo */
    .ms-grid {
      width: 18px; height: 18px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 2.5px; flex-shrink: 0;
    }
    .ms-grid span { display: block; border-radius: 1px; }
    .ms-f { background: #f25022; }
    .ms-g { background: #7fba00; }
    .ms-b { background: #00a4ef; }
    .ms-y { background: #ffb900; }

    .login-footer {
      margin-top: 28px; text-align: center;
      font-size: 11px; color: var(--muted);
      line-height: 1.9;
    }
    .login-footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
    .login-footer a:hover { color: var(--red); }

    /* ── entrance animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand-panel > * { animation: fadeUp .5s ease both; }
    .brand-panel > *:nth-child(1) { animation-delay: .04s; }
    .brand-panel > *:nth-child(2) { animation-delay: .09s; }
    .brand-panel > *:nth-child(3) { animation-delay: .14s; }

    .login-card > * { animation: fadeUp .5s ease both; }
    .login-card > *:nth-child(1) { animation-delay: .18s; }
    .login-card > *:nth-child(2) { animation-delay: .23s; }
    .login-card > *:nth-child(3) { animation-delay: .28s; }
    .login-card > *:nth-child(4) { animation-delay: .33s; }

    @media (max-width: 600px) {
      .page { grid-template-columns: 1fr; }
      .brand-panel {
        border-right: none; border-bottom: 1px solid var(--line);
        padding: 52px 32px 40px;
      }
      .login-panel { padding: 48px 32px 72px; }
      .wordmark-img { height: 52px; }
    }
  </style>
</head>
<body>

  <div class="accent-bar"></div>

  <main class="page">

    <!-- Brand panel -->
    <section class="brand-panel" aria-label="ai-dan brand">
      <img class="wordmark-img"
           src="ai-dan-wordmark.png"
           alt="ai&#8202;⋈&#8202;dan" />
      <div class="brand-rule"></div>
      <p class="brand-tagline">
        <strong>Legal intelligence, refined.</strong><br/>
        A unified AI suite built for the practice of law.
      </p>
    </section>

    <!-- Sign-in panel -->
    <section class="login-panel" aria-label="Sign in">
      <div class="login-card">
        <h1 class="login-heading">Sign in</h1>
        <p class="login-sub">
          Use your firm's Microsoft account<br/>
          to access your workspace.
        </p>

        <a class="btn-ms" href="https://hub.ai-dan.law" role="button">
          <div class="ms-grid" aria-hidden="true">
            <span class="ms-f"></span><span class="ms-g"></span>
            <span class="ms-b"></span><span class="ms-y"></span>
          </div>
          Continue with Microsoft
        </a>

        <div class="login-footer">
          By signing in you agree to the<br/>
          <a href="#">Terms of Service</a>&nbsp;&nbsp;·&nbsp;&nbsp;<a href="#">Privacy Policy</a>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
